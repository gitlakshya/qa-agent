services:
  # Main QA Agent Application
  qa-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-agent-app
    ports:
      - "8501:8501"
    environment:
      # Azure OpenAI Configuration
      - AZURE_INFERENCE_ENDPOINT=${AZURE_INFERENCE_ENDPOINT}
      - AZURE_INFERENCE_CREDENTIAL=${AZURE_INFERENCE_CREDENTIAL}
      - AZURE_DEPLOYMENT_NAME=${AZURE_DEPLOYMENT_NAME}
      - AZURE_MODEL_NAME=${AZURE_MODEL_NAME:-gpt-4}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-2024-10-01-preview}
      
      # TestRail Configuration
      - TESTRAIL_URL=${TESTRAIL_URL}
      - TESTRAIL_USERNAME=${TESTRAIL_USERNAME}
      - TESTRAIL_API_KEY=${TESTRAIL_API_KEY}
      - TESTRAIL_TIMEOUT=${TESTRAIL_TIMEOUT:-30}
      - TESTRAIL_MAX_RETRIES=${TESTRAIL_MAX_RETRIES:-3}
      - TESTRAIL_RATE_LIMIT=${TESTRAIL_RATE_LIMIT:-180}
      - TESTRAIL_REQUEST_DELAY=${TESTRAIL_REQUEST_DELAY:-0.4}
      
      # Optional: Ollama Configuration (if using local LLM)
      # - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      # - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.1:latest}
    
    volumes:
      # Mount directories for data persistence
      - ./test_cases_output:/app/test_cases_output
      - ./Related_docs:/app/Related_docs
      - ./config:/app/config
      # Mount projects.json if it changes frequently
      - ./projects.json:/app/projects.json:ro
    
    restart: unless-stopped
    
    networks:
      - qa-agent-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # File Watcher Service (Auto-sync to TestRail)
  file-watcher:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qa-agent-watcher
    environment:
      # TestRail Configuration (same as main app)
      - TESTRAIL_URL=${TESTRAIL_URL}
      - TESTRAIL_USERNAME=${TESTRAIL_USERNAME}
      - TESTRAIL_API_KEY=${TESTRAIL_API_KEY}
      - TESTRAIL_TIMEOUT=${TESTRAIL_TIMEOUT:-30}
      - TESTRAIL_MAX_RETRIES=${TESTRAIL_MAX_RETRIES:-3}
      - TESTRAIL_RATE_LIMIT=${TESTRAIL_RATE_LIMIT:-180}
      - TESTRAIL_REQUEST_DELAY=${TESTRAIL_REQUEST_DELAY:-0.4}
    
    volumes:
      # Share test_cases_output with main app
      - ./test_cases_output:/app/test_cases_output
      - ./config:/app/config:ro
      # Mount log file
      - ./logs:/app/logs
    
    command: ["python", "-m", "services.file_watcher", "test_cases_output/reviewed"]
    
    restart: unless-stopped
    
    networks:
      - qa-agent-network
    
    depends_on:
      - qa-agent

  # Optional: Ollama for local LLM (uncomment if not using Azure OpenAI)
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: qa-agent-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-data:/root/.ollama
  #   restart: unless-stopped
  #   networks:
  #     - qa-agent-network

networks:
  qa-agent-network:
    driver: bridge

volumes:
  # Uncomment if using Ollama
  # ollama-data:
  #   driver: local
  test-cases:
    driver: local
